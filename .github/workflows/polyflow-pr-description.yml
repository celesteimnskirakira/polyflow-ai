name: Auto PR Description

on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write

jobs:
  generate-description:
    name: Generate PR description with AI
    runs-on: ubuntu-latest
    # Only run if PR body is empty or contains the trigger placeholder
    if: |
      github.event.pull_request.body == '' ||
      github.event.pull_request.body == null ||
      contains(github.event.pull_request.body, '<!-- polyflow:generate -->')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff and context
        id: context
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD | head -c 6000)
          COMMITS=$(git log origin/${{ github.base_ref }}..HEAD --oneline | head -20)
          {
            echo "content<<CTX_EOF"
            echo "## Commits"
            echo "$COMMITS"
            echo ""
            echo "## Diff"
            echo "$DIFF"
            echo "CTX_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate PR description
        id: description
        uses: celesteimnskirakira/polyflow@main
        with:
          workflow: pr-description
          input: ${{ steps.context.outputs.content }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Update PR description
        uses: actions/github-script@v7
        with:
          script: |
            const generated = `${{ steps.description.outputs.result }}`;
            const footer = `\n\n---\n*🤖 Generated by [Polyflow](https://github.com/celesteimnskirakira/polyflow) · Claude + Gemini + GPT-4*`;

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: generated + footer,
            });
